# nginx для CoachDojo. Заменить YOUR_DOMAIN на реальный домен.
# Наружу проксируем ТОЛЬКО / (гейт Mini App) и /pay/* (мост). Ничего больше.

server {
    listen 80;
    server_name YOUR_DOMAIN;
    # ACME-проверки certbot отдаём по http, остальное — на https.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Корень = гейт Mini App: мост сам решает, отдать страницу или заглушку.
    location = / {
        proxy_pass http://127.0.0.1:8080/pay/landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Веб-кабинет: вход по персональной ссылке и API (гейт по cookie в самом приложении).
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Платёжные маршруты моста: enter / tariffs / create / webhook.
    location /pay/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # (Опционально) ограничить вебхук диапазонами ЮKassa — см. их докуменацию.
        # location /pay/webhook/ { allow 185.71.76.0/27; allow 185.71.77.0/27;
        #   allow 77.75.153.0/25; allow 77.75.156.11; allow 77.75.156.35;
        #   allow 2a02:5180::/32; deny all; proxy_pass http://127.0.0.1:8080; }
    }

    # Всё прочее закрыто.
    location / { return 404; }
}
