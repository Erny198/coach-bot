<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Е-Коуч — подписка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #0f1115);
    --sec: var(--tg-theme-secondary-bg-color, #181b24);
    --text: var(--tg-theme-text-color, #e8eaf0);
    --hint: var(--tg-theme-hint-color, #8b93a3);
    --btn: var(--tg-theme-button-color, #4d7cff);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --link: var(--tg-theme-link-color, #6c8cff);
    --line: rgba(255,255,255,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:16px 14px 40px}
  h1{font-size:22px;margin:6px 0 2px}
  .sub{color:var(--hint);font-size:14px;margin:0 0 16px}
  .toggle{display:flex;background:var(--sec);border-radius:12px;padding:4px;margin:0 0 18px}
  .toggle button{flex:1;border:0;background:transparent;color:var(--hint);
    padding:9px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
  .toggle button.active{background:var(--btn);color:var(--btn-text)}
  .save{color:#39d4a3;font-size:12px;font-weight:700;margin-left:6px}
  .card{background:var(--sec);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .card.best{border-color:#39d4a3;box-shadow:0 0 0 1px rgba(57,212,163,.3) inset}
  .card .t{font-weight:600}
  .card .badge{display:inline-block;font-size:11px;font-weight:700;color:#0c0e13;
    background:#39d4a3;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  .card .p{color:var(--hint);font-size:13px;margin-top:2px}
  .card .p b{color:var(--text);font-size:17px}
  .buy{border:0;background:var(--btn);color:var(--btn-text);font-weight:600;
    padding:10px 14px;border-radius:10px;font-size:14px;cursor:pointer;white-space:nowrap}
  .buy:disabled{opacity:.5}
  .note{color:var(--hint);font-size:12px;text-align:center;margin-top:14px}
  .err{color:#ff7a85;font-size:13px;text-align:center;margin-top:12px;min-height:18px}
  .skeleton{height:64px;border-radius:14px;background:var(--sec);margin-bottom:12px;
    animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:.9}}
</style>
</head>
<body>
  <h1>Открой полный доступ</h1>
  <p class="sub">AI-наставник коуча: практика, тренировки и супервизия каждый день.</p>

  <div class="toggle">
    <button id="m" class="active" onclick="setPeriod('month')">Месяц</button>
    <button id="y" onclick="setPeriod('year')">Год <span class="save">−2 мес</span></button>
  </div>

  <div id="list">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>

  <div class="err" id="err"></div>
  <p class="note">Оплата через ЮKassa. Подписку можно отменить в любой момент.</p>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  let period = "month";
  let tiers = [];

  function fmt(n){ return new Intl.NumberFormat("ru-RU").format(n); }

  function setPeriod(p){
    period = p;
    document.getElementById("m").classList.toggle("active", p==="month");
    document.getElementById("y").classList.toggle("active", p==="year");
    render();
  }

  function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";
    for (const t of tiers){
      const price = period==="month" ? t.rub_month : t.rub_year;
      const per = period==="month" ? "мес" : "год";
      const card = document.createElement("div");
      card.className = "card" + (t.best ? " best" : "");
      card.innerHTML =
        `<div><div class="t">${t.title}${t.best?'<span class="badge">Выгодно</span>':''}</div>`+
        `<div class="p"><b>₽${fmt(price)}</b> / ${per}</div></div>`+
        `<button class="buy">Оформить</button>`;
      card.querySelector(".buy").addEventListener("click", () => buy(t.key, card));
      list.appendChild(card);
    }
  }

  async function load(){
    try{
      const r = await fetch("/pay/tariffs", {credentials:"same-origin"});
      const data = await r.json();
      tiers = data.tiers || [];
      render();
    }catch(e){ showErr("Не удалось загрузить тарифы. Обнови страницу."); }
  }

  async function buy(tier, card){
    const btn = card.querySelector(".buy");
    btn.disabled = true; btn.textContent = "…"; showErr("");
    try{
      const r = await fetch("/pay/create", {
        method:"POST", credentials:"same-origin",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({tier, period})
      });
      const data = await r.json();
      if (data.confirmation_url){
        if (tg) tg.openLink(data.confirmation_url); else location.href = data.confirmation_url;
      } else {
        showErr(data.error === "unauthorized" ? "Открой страницу заново из бота." : "Ошибка оплаты, попробуй ещё раз.");
      }
    }catch(e){ showErr("Ошибка сети. Попробуй ещё раз."); }
    finally{ btn.disabled = false; btn.textContent = "Оформить"; }
  }

  function showErr(m){ document.getElementById("err").textContent = m; }
  load();
</script>
</body>
</html>
